#
# 基础应用配置(与板卡无关的默认开关)。
# 板卡专属差异放在 boards/<board>/<board>_defconfig 或 overlays/ 中。

# ---- 内核 ----
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_LOG=y

# ---- 外设子系统 ----
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_COUNTER=y

# ---- 自定义 BSP 驱动 ----
CONFIG_BSP_DAC81416=y   # DAC81416 驱动(换 DAC 隔离点)
CONFIG_BSP_SRAM=y       # 外部 SRAM(波形引擎 DMA 缓冲)
CONFIG_BSP_ETH=y        # 以太网 PHY
CONFIG_BSP_CAN=y        # CAN 收发

# ---- CAN(控制帧通道)----
CONFIG_CAN=y

# ---- 网络(以太网 + TCP/IP;不做 WiFi)----
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y

# ---- JSON(上位机指令解析)----
CONFIG_JSON_LIBRARY=y

# ---- Shell(fault_console 本地控制台)----
CONFIG_SHELL=y
